services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fielddesk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fielddesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fielddesk}
      POSTGRES_DB: ${POSTGRES_DB:-fielddesk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fielddesk}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: fielddesk-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/pressly/goose:latest
    container_name: fielddesk-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${DATABASE_URL}
    volumes:
      - ./infra/migrations:/migrations
    command: ["-dir", "/migrations", "up"]

  createbuckets:
    image: minio/mc:latest
    container_name: fielddesk-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-fielddesk} &&
      echo 'bucket ready: ${S3_BUCKET:-fielddesk}'
      "

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: fielddesk-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_USE_SSL: ${S3_USE_SSL}
      VOICE_NOTE_MAX_BYTES: ${VOICE_NOTE_MAX_BYTES}
      PRESIGN_TTL_SECONDS: ${PRESIGN_TTL_SECONDS}
      ALLOW_TENANT_HEADER_AUTH: ${ALLOW_TENANT_HEADER_AUTH:-true}
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: fielddesk-worker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_USE_SSL: ${S3_USE_SSL}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL}
      EXTRACTION_CONFIDENCE_THRESHOLD: ${EXTRACTION_CONFIDENCE_THRESHOLD}
      LLM_PROVIDER: ${LLM_PROVIDER}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS}
      WORKER_MAX_CONCURRENT_JOBS: ${WORKER_MAX_CONCURRENT_JOBS}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES}

  # Opt-in sidecar that runs the Phase 4c eval CLI on an interval. Enable
  # with `docker compose --profile evals up evals`. Defaults to a 24h
  # interval; set EVALS_INTERVAL_SECONDS=3600 for hourly during development.
  # Set EVALS_TENANT_ID to the tenant whose corpus + extraction prompt
  # you want measured. The container reuses the worker image (same deps,
  # same code) so there's no second Dockerfile to maintain.
  evals:
    profiles: ["evals"]
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: fielddesk-evals
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVALS_TENANT_ID: ${EVALS_TENANT_ID}
      EVALS_INTERVAL_SECONDS: ${EVALS_INTERVAL_SECONDS:-86400}
      EVALS_KIND: ${EVALS_KIND:-all}
    # `|| true` prevents a single failing eval (e.g. an OpenAI 5xx, or a
    # transient pgvector index miss) from killing the loop and pulling
    # the sidecar into compose's restart-loop backoff. Runtime failures
    # land in ai_eval_runs with pass=0 when Postgres is reachable;
    # cron-style alerting is the right place to escalate, not docker
    # restart behavior.
    command:
      - /bin/sh
      - -c
      - |
        if [ -z "$$EVALS_TENANT_ID" ]; then
          echo "EVALS_TENANT_ID is required" >&2
          exit 64
        fi
        while true; do
          echo "[evals] running kind=$$EVALS_KIND tenant=$$EVALS_TENANT_ID"
          ./scripts/eval.sh "$$EVALS_TENANT_ID" "$$EVALS_KIND" || true
          sleep "$$EVALS_INTERVAL_SECONDS"
        done
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: fielddesk-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
